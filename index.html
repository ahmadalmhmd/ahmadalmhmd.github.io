<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech News Pro | AI-Powered Tech Intelligence</title>
    <meta name="description" content="Daily curated tech news with AI summaries, significance scores, and smart categorization">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .badge {
            background: #f0f0f0;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            color: #666;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .stat-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
        }
        
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
        }
        
        .filter-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }
        
        .filter-btn.active {
            background: #667eea;
            color: white;
        }
        
        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .article-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }
        
        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }
        
        .significance-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            z-index: 1;
        }
        
        .significance-5 { background: #ff4757; color: white; }
        .significance-4 { background: #ffa502; color: white; }
        .significance-3 { background: #ffd32a; color: #333; }
        .significance-2 { background: #70a1ff; color: white; }
        .significance-1 { background: #a4b0be; color: white; }
        
        .article-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        
        .article-content {
            padding: 20px;
        }
        
        .article-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 0.85em;
        }
        
        .source-tag {
            background: #e0e7ff;
            color: #4f46e5;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 600;
        }
        
        .status-tag {
            background: #f0f0f0;
            padding: 3px 8px;
            border-radius: 4px;
        }
        
        .article-title {
            font-size: 1.3em;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        
        .article-title a {
            color: #333;
            text-decoration: none;
        }
        
        .article-title a:hover {
            color: #667eea;
        }
        
        .article-summary {
            color: #666;
            font-size: 0.95em;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 15px;
        }
        
        .tag {
            background: #f0f0f0;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            color: #666;
        }
        
        .entities-container {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 15px;
        }
        
        .entity {
            background: #e0e7ff;
            color: #4f46e5;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: 500;
        }
        
        .article-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
        
        .read-more {
            background: #667eea;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9em;
            transition: background 0.3s;
        }
        
        .read-more:hover {
            background: #5a6fd8;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 1.2em;
        }
        
        .error {
            background: #ff4757;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .no-articles {
            background: white;
            padding: 50px;
            border-radius: 15px;
            text-align: center;
            color: #666;
        }
        
        @media (max-width: 768px) {
            .articles-grid {
                grid-template-columns: 1fr;
            }
            
            .header-top {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <h1><i class="fas fa-robot"></i> Tech News Pro</h1>
                <div class="badge">
                    <i class="fas fa-microchip"></i> AI-Powered Intelligence
                </div>
            </div>
            
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="article-count">0</div>
                    <div>Articles Today</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="sources-count">0</div>
                    <div>Sources</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="avg-significance">0</div>
                    <div>Avg Significance</div>
                </div>
            </div>
            
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="significance-5">🔥 Breaking (5)</button>
                <button class="filter-btn" data-filter="significance-4">⭐ High (4)</button>
                <button class="filter-btn" data-filter="ai">🤖 AI</button>
                <button class="filter-btn" data-filter="cybersecurity">🔐 Security</button>
                <button class="filter-btn" data-filter="cloud">☁️ Cloud</button>
            </div>
        </header>
        
        <div id="news-container">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i> Loading AI-curated news...
            </div>
        </div>
    </div>

    <script>
        // بيانات Airtable API
        const AIRTABLE_CONFIG = {
            baseId: 'YOUR_BASE_ID',
            tableName: 'Articles',
            apiKey: 'YOUR_API_KEY'
        };

        async function fetchArticles() {
            try {
                // جلب البيانات من Airtable
                const response = await fetch(`https://api.airtable.com/v0/${AIRTABLE_CONFIG.baseId}/${AIRTABLE_CONFIG.tableName}?sort%5B0%5D%5Bfield%5D=AI%20Significance&sort%5B0%5D%5Bdirection%5D=desc&maxRecords=50`, {
                    headers: {
                        'Authorization': `Bearer ${AIRTABLE_CONFIG.apiKey}`
                    }
                });
                
                if (!response.ok) throw new Error('Failed to fetch articles');
                
                const data = await response.json();
                const articles = data.records.map(record => ({
                    id: record.id,
                    ...record.fields
                }));
                
                displayArticles(articles);
                updateStats(articles);
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('news-container').innerHTML = `
                    <div class="error">
                        <i class="fas fa-exclamation-triangle"></i>
                        Error loading news. Please try again.
                    </div>
                `;
            }
        }

        function displayArticles(articles) {
            const container = document.getElementById('news-container');
            
            if (!articles || articles.length === 0) {
                container.innerHTML = '<div class="no-articles">📭 No articles found</div>';
                return;
            }

            const html = `
                <div class="articles-grid">
                    ${articles.map(article => `
                        <div class="article-card" data-significance="${article['AI Significance'] || 1}">
                            <div class="significance-badge significance-${article['AI Significance'] || 1}">
                                ${article['AI Significance'] === 5 ? '🔥 BREAKING' : 
                                  article['AI Significance'] === 4 ? '⭐ HIGH' : 
                                  article['AI Significance'] === 3 ? '📌 MEDIUM' : 'ℹ️ INFO'}
                            </div>
                            
                            <img class="article-image" 
                                 src="${article['Image URL'] || 'https://via.placeholder.com/400x200?text=Tech+News'}" 
                                 alt="${article.Title}"
                                 onerror="this.src='https://via.placeholder.com/400x200?text=Tech+News'">
                            
                            <div class="article-content">
                                <div class="article-meta">
                                    <span class="source-tag">
                                        <i class="fas fa-newspaper"></i> ${article.Source || 'Tech'}
                                    </span>
                                    ${article['AI Status'] ? `
                                        <span class="status-tag">
                                            <i class="fas fa-tag"></i> ${article['AI Status'].replace('_', ' ')}
                                        </span>
                                    ` : ''}
                                    <span>
                                        <i class="far fa-calendar"></i> 
                                        ${new Date(article['Published Date']).toLocaleDateString('en-US', {
                                            month: 'short',
                                            day: 'numeric'
                                        })}
                                    </span>
                                </div>
                                
                                <h2 class="article-title">
                                    <a href="${article.Link}" target="_blank">${article.Title}</a>
                                </h2>
                                
                                <p class="article-summary">${article['AI Summary'] || article.Description || ''}</p>
                                
                                ${article['AI Tags'] ? `
                                    <div class="tags-container">
                                        ${article['AI Tags'].split(',').map(tag => `
                                            <span class="tag">${tag.trim()}</span>
                                        `).join('')}
                                    </div>
                                ` : ''}
                                
                                ${article['AI Entities'] ? `
                                    <div class="entities-container">
                                        ${article['AI Entities'].split(',').map(entity => `
                                            <span class="entity">${entity.trim()}</span>
                                        `).join('')}
                                    </div>
                                ` : ''}
                                
                                <div class="article-footer">
                                    <span class="sentiment">
                                        ${article['AI Sentiment'] === 'positive' ? '😊' : 
                                          article['AI Sentiment'] === 'negative' ? '😟' : '😐'}
                                    </span>
                                    <a href="${article.Link}" class="read-more" target="_blank">
                                        Read Full <i class="fas fa-arrow-right"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;

            container.innerHTML = html;
            
            // تفعيل الفلاتر
            setupFilters(articles);
        }

        function updateStats(articles) {
            document.getElementById('article-count').textContent = articles.length;
            
            const sources = new Set(articles.map(a => a.Source)).size;
            document.getElementById('sources-count').textContent = sources;
            
            const avgSig = articles.reduce((sum, a) => sum + (a['AI Significance'] || 1), 0) / articles.length;
            document.getElementById('avg-significance').textContent = avgSig.toFixed(1);
        }

        function setupFilters(articles) {
            const filterBtns = document.querySelectorAll('.filter-btn');
            const cards = document.querySelectorAll('.article-card');
            
            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    // تحديث الزر النشط
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    const filter = btn.dataset.filter;
                    
                    cards.forEach(card => {
                        const significance = card.dataset.significance;
                        
                        if (filter === 'all') {
                            card.style.display = 'block';
                        } else if (filter === 'significance-5' && significance === '5') {
                            card.style.display = 'block';
                        } else if (filter === 'significance-4' && significance === '4') {
                            card.style.display = 'block';
                        } else if (filter === 'ai') {
                            const hasAITag = card.querySelector('.tag')?.textContent.includes('AI');
                            card.style.display = hasAITag ? 'block' : 'none';
                        } else {
                            card.style.display = 'none';
                        }
                    });
                });
            });
        }

        // تحميل عند بدء التشغيل
        document.addEventListener('DOMContentLoaded', fetchArticles);
        
        // تحديث كل 5 دقائق
        setInterval(fetchArticles, 5 * 60 * 1000);
    </script>
</body>
</html>
