name: تحديث الأخبار

on:
  schedule:
    - cron: '*/30 * * * *'  # كل 30 دقيقة
  workflow_dispatch:  # يسمح بالتشغيل اليدوي

permissions:
  contents: write  # إعطاء صلاحيات الكتابة

jobs:
  update-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: استنساخ المستودع
        uses: actions/checkout@v3
      
      - name: إعداد Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: تثبيت الحزم
        run: npm install
      
      - name: تشغيل سكريبت التحديث
        run: npm run update-news  # أو الأمر الذي تستخدمه للتحديث
      
      - name: حفظ التغييرات
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add .
          git commit -m "تحديث ملف الأخبار" || echo "لا توجد تغييرات"
      
      - name: دفع التغييرات 🔥
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git push origin main
