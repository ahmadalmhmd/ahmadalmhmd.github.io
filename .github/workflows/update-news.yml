name: تحديث الأخبار

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: استنساخ المستودع
        uses: actions/checkout@v3
      
      - name: تثبيت Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: تثبيت الحزم
        run: npm ci
      
      - name: تشغيل سكريبت التحديث
        run: node server.js
      
      - name: حفظ التغييرات
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add cache.json
          git diff --quiet && git diff --staged --quiet || git commit -m "تحديث تلقائي للأخبار"
          git push
