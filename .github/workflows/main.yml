name: تحديث الأخبار التلقائي

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      username:
        description: 'اسم المستخدم (اتركه فارغاً)'
        required: false
        default: ''
      repo:
        description: 'اسم المستودع (اتركه فارغاً)'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: تحديث الموقع
    
    steps:
    - name: إعداد Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
    
    - name: تحديد المستودع
      id: repo
      run: |
        USERNAME="${{ github.event.inputs.username }}"
        REPO="${{ github.event.inputs.repo }}"
        
        if [ -z "$USERNAME" ]; then
          USERNAME="ahmadaLmhd"
        fi
        
        if [ -z "$REPO" ]; then
          REPO="ahmadaLmhd.github.io"
        fi
        
        echo "username=$USERNAME" >> $GITHUB_OUTPUT
        echo "repo=$REPO" >> $GITHUB_OUTPUT
    
    - name: استنساخ المستودع
      run: |
        mkdir -p repo
        cd repo
        USERNAME="${{ steps.repo.outputs.username }}"
        REPO="${{ steps.repo.outputs.repo }}"
        git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/$USERNAME/$REPO.git" .
    
    - name: إنشاء الملفات
      run: |
        cd repo
        
        cat > index.html << 'EOF'
        <!DOCTYPE html>
        <html dir="rtl" lang="ar">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>موقعي</title>
            <style>
                * { margin: 0; padding: 0; box-sizing: border-box; }
                body { 
                    background: linear-gradient(135deg, #667eea, #764ba2);
                    min-height: 100vh;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    padding: 20px;
                    font-family: Arial, sans-serif;
                }
                .card {
                    background: white;
                    border-radius: 30px;
                    padding: 40px;
                    max-width: 500px;
                    width: 100%;
                    text-align: center;
                    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                }
                h1 {
                    color: #333;
                    margin-bottom: 20px;
                    font-size: 2.5em;
                }
                .badge {
                    background: #4ade80;
                    color: white;
                    padding: 10px 20px;
                    border-radius: 50px;
                    display: inline-block;
                    margin: 20px 0;
                    font-weight: bold;
                }
                .info {
                    background: #f3f4f6;
                    border-radius: 15px;
                    padding: 20px;
                    margin: 20px 0;
                    text-align: right;
                }
                .info-item {
                    padding: 10px;
                    border-bottom: 1px solid #ddd;
                }
                .info-item:last-child {
                    border-bottom: none;
                }
                .label {
                    color: #666;
                    font-size: 0.9em;
                }
                .value {
                    color: #333;
                    font-weight: bold;
                    font-size: 1.2em;
                }
                .live {
                    display: inline-block;
                    width: 10px;
                    height: 10px;
                    background: #4ade80;
                    border-radius: 50%;
                    animation: pulse 1.5s infinite;
                    margin-left: 5px;
                }
                @keyframes pulse {
                    0% { opacity: 1; transform: scale(1); }
                    50% { opacity: 0.5; transform: scale(1.2); }
                    100% { opacity: 1; transform: scale(1); }
                }
                .footer {
                    color: #999;
                    font-size: 0.9em;
                    margin-top: 20px;
                }
            </style>
        </head>
        <body>
            <div class="card">
                <h1>✨ ${{ steps.repo.outputs.username }}</h1>
                
                <div class="badge">
                    <span class="live"></span>
                    النظام يعمل
                </div>
                
                <div class="info">
                    <div class="info-item">
                        <div class="label">📋 اسم المستخدم</div>
                        <div class="value">${{ steps.repo.outputs.username }}</div>
                    </div>
                    <div class="info-item">
                        <div class="label">📁 المستودع</div>
                        <div class="value">${{ steps.repo.outputs.repo }}</div>
                    </div>
                    <div class="info-item">
                        <div class="label">⏱️ آخر تحديث</div>
                        <div class="value">$(date +"%Y-%m-%d %H:%M:%S")</div>
                    </div>
                    <div class="info-item">
                        <div class="label">📊 الحالة</div>
                        <div class="value" style="color: #4ade80;">✅ ناجح</div>
                    </div>
                </div>
                
                <div class="footer">
                    تم النشر بواسطة GitHub Actions
                </div>
            </div>
        </body>
        </html>
        EOF
        
        echo "# ${{ steps.repo.outputs.username }}" > README.md
        echo "" >> README.md
        echo "آخر تحديث: $(date)" >> README.md
        touch .nojekyll
    
    - name: رفع التغييرات
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cd repo
        USERNAME="${{ steps.repo.outputs.username }}"
        REPO="${{ steps.repo.outputs.repo }}"
        
        git add .
        git commit -m "تحديث: $(date)" || echo "لا تغييرات"
        git push "https://x-access-token:${GITHUB_TOKEN}@github.com/$USERNAME/$REPO.git" HEAD:main || git push "https://x-access-token:${GITHUB_TOKEN}@github.com/$USERNAME/$REPO.git" HEAD:master || echo "تم الرفع"
    
    - name: تقرير
      if: always()
      run: |
        echo "✅ تم التحديث بنجاح" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "🔗 https://${{ steps.repo.outputs.username }}.github.io" >> $GITHUB_STEP_SUMMARY
